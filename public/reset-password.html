<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Redefinir senha | Vozia Vault</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="top">
  <div class="brand">VOZIA <span>VAULT</span></div>
  <nav>
    <a href="/"><button class="ghost" type="button">Voltar</button></a>
  </nav>
</header>

<main class="container">
  <section class="card" style="max-width:560px;margin:40px auto;">
    <h2>Redefinir senha</h2>
    <p class="small">
      Digite sua nova senha para acessar novamente sua conta.
    </p>

    <label>Nova senha</label>
    <input id="newPassword" type="password" placeholder="Digite a nova senha">

    <label>Confirmar nova senha</label>
    <input id="confirmPassword" type="password" placeholder="Repita a nova senha">

    <button id="updatePasswordBtn" class="green" type="button">Salvar nova senha</button>
    <div id="resetMsg" class="msg"></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/supabase-config.js"></script>
<script src="/supabase-api.js"></script>
<script src="/supabase-password.js"></script>

<script>
  function mostrarResetMsg(texto, ok = false) {
    const el = document.getElementById("resetMsg");
    el.textContent = texto;
    el.className = "msg" + (ok ? " ok" : "");
    el.style.display = "block";
  }

  document.getElementById("updatePasswordBtn").addEventListener("click", async () => {
    const senha = document.getElementById("newPassword").value.trim();
    const confirmar = document.getElementById("confirmPassword").value.trim();

    if (!senha || senha.length < 6) {
      mostrarResetMsg("A nova senha precisa ter pelo menos 6 caracteres.");
      return;
    }

    if (senha !== confirmar) {
      mostrarResetMsg("As senhas não conferem.");
      return;
    }

    try {
      await voziaUpdatePassword(senha);

      mostrarResetMsg("Senha alterada com sucesso. Você já pode voltar e fazer login.", true);

      setTimeout(() => {
        window.location.href = "/";
      }, 2200);
    } catch (e) {
      mostrarResetMsg(e.message || "Erro ao alterar senha.");
    }
  });
</script>
</body>
</html>
