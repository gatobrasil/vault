<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Demonstração Vozia Care</title><link rel="stylesheet" href="/style.css"></head><body><header class="top"><div class="brand">VOZIA <span>CARE DEMO</span></div><nav><a href="/"><button class="ghost">Voltar</button></a></nav></header><main class="container"><section class="card"><h1>Demonstração do Vozia Care</h1><p class="small">Aqui os botões falam com a voz de teste do navegador. No app final, os botões fixos usam a voz gravada do paciente.</p><div class="careGrid"><button class="speakDemo" data-text="Quero água">Quero água</button><button class="speakDemo" data-text="Estou com dor">Estou com dor</button><button class="speakDemo" data-text="Chame minha família">Chamar família</button><button class="speakDemo" data-text="Obrigado por cuidar de mim">Obrigado</button></div></section><section class="card"><h2>Teclado ativo</h2><p class="small">Recurso avançado por upgrade mensal: voz sintética próxima da voz do paciente.</p><input id="demoText" placeholder="Digite uma frase para testar com voz do navegador"><button onclick="speakDemoText(document.getElementById('demoText').value || 'Olá, eu sou o Vozia Care')">Testar voz</button></section></main><script>function speakDemoText(text){if(!('speechSynthesis' in window)){alert('Voz não disponível neste navegador');return;} speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='pt-BR'; u.rate=.92; const voices=speechSynthesis.getVoices(); const v=voices.find(x=>/pt-BR|Portuguese|Brasil|Google/i.test(x.lang+' '+x.name)); if(v)u.voice=v; speechSynthesis.speak(u);}document.addEventListener('click',e=>{const b=e.target.closest('.speakDemo'); if(b)speakDemoText(b.dataset.text||b.textContent.trim());});</script></body></html>
